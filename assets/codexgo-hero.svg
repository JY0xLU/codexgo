<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">codexgo project hero</title>
  <desc id="desc">A terminal-inspired hero image for codexgo, a local-only Codex recovery skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07120E"/>
      <stop offset="0.48" stop-color="#0E1B18"/>
      <stop offset="1" stop-color="#13251F"/>
    </linearGradient>
    <linearGradient id="panel" x1="190" y1="98" x2="1210" y2="622" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10231D" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#08110F" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="accent" x1="256" y1="223" x2="1089" y2="471" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.203 0 0 0 0 0.827 0 0 0 0 0.576 0 0 0 0.32 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="32" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.045"/>
    </pattern>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Mono", "JetBrains Mono", Consolas, monospace; }
      .sans { font-family: "Space Grotesk", "Aptos Display", "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1400" height="720" rx="42" fill="url(#bg)"/>
  <rect width="1400" height="720" rx="42" fill="url(#grid)"/>
  <circle cx="1090" cy="142" r="176" fill="#34D399" opacity="0.12" filter="url(#glow)"/>
  <circle cx="298" cy="602" r="214" fill="#67E8F9" opacity="0.09" filter="url(#glow)"/>

  <g filter="url(#softShadow)">
    <rect x="132" y="78" width="1136" height="564" rx="34" fill="url(#panel)" stroke="#D1FAE5" stroke-opacity="0.13"/>
    <rect x="132" y="78" width="1136" height="58" rx="34" fill="#0B1512"/>
    <rect x="132.5" y="135.5" width="1135" height="1" fill="#D1FAE5" opacity="0.09"/>
    <circle cx="178" cy="108" r="9" fill="#FB7185"/>
    <circle cx="208" cy="108" r="9" fill="#FBBF24"/>
    <circle cx="238" cy="108" r="9" fill="#34D399"/>

    <text x="178" y="216" class="sans" fill="#ECFDF5" font-size="78" font-weight="800" letter-spacing="-3">codexgo</text>
    <rect x="546" y="166" width="128" height="42" rx="21" fill="#D1FAE5" fill-opacity="0.09" stroke="#D1FAE5" stroke-opacity="0.18"/>
    <text x="570" y="194" class="mono" fill="#A7F3D0" font-size="18" font-weight="700">skill</text>
    <text x="180" y="264" class="sans" fill="#A7F3D0" font-size="26" font-weight="600">Recover the last actionable Codex request after a broken compact.</text>
    <text x="180" y="304" class="sans" fill="#B8C8C1" font-size="20">Small, local-only, read-only. No network calls. No runtime dependencies.</text>

    <rect x="178" y="356" width="590" height="182" rx="24" fill="#07100E" stroke="#D1FAE5" stroke-opacity="0.12"/>
    <text x="214" y="402" class="mono" fill="#86EFAC" font-size="22">$ codexgo</text>
    <text x="214" y="438" class="mono" fill="#CBD5E1" font-size="20">reading ~/.codex/state_5.sqlite</text>
    <text x="214" y="474" class="mono" fill="#CBD5E1" font-size="20">parsing rollout timeline</text>
    <text x="214" y="510" class="mono" fill="#FDE68A" font-size="20">resolved_request: "finish the task"</text>

    <g>
      <rect x="828" y="352" width="150" height="84" rx="22" fill="#D1FAE5" fill-opacity="0.08" stroke="#D1FAE5" stroke-opacity="0.14"/>
      <text x="854" y="388" class="mono" fill="#ECFDF5" font-size="18" font-weight="700">local</text>
      <text x="854" y="416" class="sans" fill="#A7F3D0" font-size="17">only</text>
      <rect x="1004" y="352" width="150" height="84" rx="22" fill="#D1FAE5" fill-opacity="0.08" stroke="#D1FAE5" stroke-opacity="0.14"/>
      <text x="1030" y="388" class="mono" fill="#ECFDF5" font-size="18" font-weight="700">read</text>
      <text x="1030" y="416" class="sans" fill="#A7F3D0" font-size="17">only</text>
      <rect x="828" y="458" width="150" height="84" rx="22" fill="#D1FAE5" fill-opacity="0.08" stroke="#D1FAE5" stroke-opacity="0.14"/>
      <text x="854" y="494" class="mono" fill="#ECFDF5" font-size="18" font-weight="700">zero</text>
      <text x="854" y="522" class="sans" fill="#A7F3D0" font-size="17">deps</text>
      <rect x="1004" y="458" width="150" height="84" rx="22" fill="#D1FAE5" fill-opacity="0.08" stroke="#D1FAE5" stroke-opacity="0.14"/>
      <text x="1030" y="494" class="mono" fill="#ECFDF5" font-size="18" font-weight="700">text</text>
      <text x="1030" y="522" class="sans" fill="#A7F3D0" font-size="17">or JSON</text>
    </g>
  </g>

  <path d="M184 586H1216" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <circle cx="184" cy="586" r="7" fill="#34D399"/>
  <circle cx="528" cy="586" r="7" fill="#67E8F9"/>
  <circle cx="872" cy="586" r="7" fill="#FBBF24"/>
  <circle cx="1216" cy="586" r="7" fill="#A7F3D0"/>
</svg>
