<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">codexgo usage flow</title>
  <desc id="desc">The codexgo recovery flow from an interrupted Codex session to the restored request.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3E8"/>
      <stop offset="1" stop-color="#DFF7EF"/>
    </linearGradient>
    <linearGradient id="card" x1="80" y1="94" x2="1318" y2="426" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FFFB"/>
    </linearGradient>
    <linearGradient id="line" x1="232" y1="270" x2="1168" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.5" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Mono", "JetBrains Mono", Consolas, monospace; }
      .sans { font-family: "Space Grotesk", "Aptos Display", "Segoe UI", sans-serif; }
    </style>
  </defs>
  <rect width="1400" height="520" rx="36" fill="url(#bg)"/>
  <circle cx="113" cy="95" r="82" fill="#34D399" opacity="0.17"/>
  <circle cx="1276" cy="416" r="110" fill="#FBBF24" opacity="0.16"/>

  <text x="82" y="88" class="sans" fill="#10231D" font-size="40" font-weight="800" letter-spacing="-1">How codexgo restores your thread</text>
  <text x="82" y="124" class="sans" fill="#40534B" font-size="20">Run one word in a fresh Codex session. The tool does the boring archaeology.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="172" width="282" height="218" rx="28" fill="url(#card)" stroke="#0F766E" stroke-opacity="0.14"/>
    <rect x="100" y="194" width="62" height="62" rx="20" fill="#ECFDF5"/>
    <text x="120" y="236" class="mono" fill="#047857" font-size="28" font-weight="800">1</text>
    <text x="100" y="294" class="sans" fill="#10231D" font-size="26" font-weight="800">Session breaks</text>
    <text x="100" y="330" class="sans" fill="#51625B" font-size="18">Compact fails, the app crashes,</text>
    <text x="100" y="358" class="sans" fill="#51625B" font-size="18">or the context disappears.</text>

    <rect x="406" y="172" width="282" height="218" rx="28" fill="url(#card)" stroke="#0891B2" stroke-opacity="0.14"/>
    <rect x="428" y="194" width="62" height="62" rx="20" fill="#ECFEFF"/>
    <text x="448" y="236" class="mono" fill="#0E7490" font-size="28" font-weight="800">2</text>
    <text x="428" y="294" class="sans" fill="#10231D" font-size="26" font-weight="800">Type codexgo</text>
    <text x="428" y="330" class="sans" fill="#51625B" font-size="18">It reads local Codex state</text>
    <text x="428" y="358" class="sans" fill="#51625B" font-size="18">and finds the previous thread.</text>

    <rect x="734" y="172" width="282" height="218" rx="28" fill="url(#card)" stroke="#CA8A04" stroke-opacity="0.14"/>
    <rect x="756" y="194" width="62" height="62" rx="20" fill="#FEF3C7"/>
    <text x="776" y="236" class="mono" fill="#B45309" font-size="28" font-weight="800">3</text>
    <text x="756" y="294" class="sans" fill="#10231D" font-size="26" font-weight="800">Resolve intent</text>
    <text x="756" y="330" class="sans" fill="#51625B" font-size="18">It skips low-signal replies</text>
    <text x="756" y="358" class="sans" fill="#51625B" font-size="18">and keeps the real request.</text>

    <rect x="1062" y="172" width="260" height="218" rx="28" fill="#10231D"/>
    <text x="1090" y="230" class="mono" fill="#86EFAC" font-size="20">$ codexgo</text>
    <text x="1090" y="270" class="mono" fill="#ECFDF5" font-size="18">continue:</text>
    <text x="1090" y="306" class="mono" fill="#FDE68A" font-size="18">"finish the repo</text>
    <text x="1090" y="334" class="mono" fill="#FDE68A" font-size="18">README polish"</text>
  </g>

  <path d="M360 281H406" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M688 281H734" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M1016 281H1062" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
</svg>
