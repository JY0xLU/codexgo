<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">codexgo recovery flow</title>
  <desc id="desc">A clean four-step flow showing how codexgo restores the previous actionable Codex request.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3E8"/>
      <stop offset="1" stop-color="#E7F8F0"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="278" x2="1110" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.5" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Mono", "JetBrains Mono", Consolas, monospace; }
      .sans { font-family: "Space Grotesk", "Aptos Display", "Segoe UI", sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="560" rx="32" fill="url(#bg)"/>
  <rect x="38" y="38" width="1204" height="484" rx="28" fill="#FFFFFF" fill-opacity="0.62" stroke="#0F766E" stroke-opacity="0.12"/>

  <text x="78" y="102" class="sans" fill="#10231D" font-size="38" font-weight="800" letter-spacing="-0.8">codexgo recovery flow</text>
  <text x="78" y="138" class="sans" fill="#50635B" font-size="19">One command turns local Codex session archaeology into a clean continuation prompt.</text>

  <path d="M172 284H1108" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="172" cy="284" r="12" fill="#0F766E"/>
  <circle cx="484" cy="284" r="12" fill="#0891B2"/>
  <circle cx="796" cy="284" r="12" fill="#CA8A04"/>
  <circle cx="1108" cy="284" r="12" fill="#059669"/>

  <g filter="url(#shadow)">
    <rect x="78" y="190" width="230" height="190" rx="24" fill="#FFFFFF" stroke="#0F766E" stroke-opacity="0.18"/>
    <rect x="102" y="214" width="48" height="48" rx="14" fill="#ECFDF5"/>
    <text x="119" y="247" class="mono" fill="#047857" font-size="24" font-weight="800">1</text>
    <text x="102" y="314" class="sans" fill="#10231D" font-size="24" font-weight="800">Break</text>
    <text x="102" y="346" class="sans" fill="#50635B" font-size="16">Compact fails, crash happens,</text>
    <text x="102" y="370" class="sans" fill="#50635B" font-size="16">or context is gone.</text>

    <rect x="390" y="190" width="230" height="190" rx="24" fill="#FFFFFF" stroke="#0891B2" stroke-opacity="0.18"/>
    <rect x="414" y="214" width="48" height="48" rx="14" fill="#ECFEFF"/>
    <text x="431" y="247" class="mono" fill="#0E7490" font-size="24" font-weight="800">2</text>
    <text x="414" y="314" class="sans" fill="#10231D" font-size="24" font-weight="800">Run</text>
    <text x="414" y="346" class="mono" fill="#0F766E" font-size="18">$ codexgo</text>
    <text x="414" y="370" class="sans" fill="#50635B" font-size="16">inside the same workspace.</text>

    <rect x="702" y="190" width="230" height="190" rx="24" fill="#FFFFFF" stroke="#CA8A04" stroke-opacity="0.18"/>
    <rect x="726" y="214" width="48" height="48" rx="14" fill="#FEF3C7"/>
    <text x="743" y="247" class="mono" fill="#B45309" font-size="24" font-weight="800">3</text>
    <text x="726" y="314" class="sans" fill="#10231D" font-size="24" font-weight="800">Resolve</text>
    <text x="726" y="346" class="sans" fill="#50635B" font-size="16">Skip low-signal replies and</text>
    <text x="726" y="370" class="sans" fill="#50635B" font-size="16">recover the real request.</text>

    <rect x="1014" y="190" width="188" height="190" rx="24" fill="#10231D"/>
    <rect x="1038" y="214" width="48" height="48" rx="14" fill="#1E3A34"/>
    <text x="1055" y="247" class="mono" fill="#86EFAC" font-size="24" font-weight="800">4</text>
    <text x="1038" y="314" class="sans" fill="#ECFDF5" font-size="24" font-weight="800">Continue</text>
    <text x="1038" y="346" class="mono" fill="#FDE68A" font-size="16">resolved_request</text>
    <text x="1038" y="370" class="sans" fill="#A7F3D0" font-size="16">text or JSON output.</text>
  </g>

  <rect x="78" y="424" width="1124" height="48" rx="16" fill="#10231D"/>
  <text x="104" y="455" class="mono" fill="#86EFAC" font-size="17">local-only</text>
  <text x="220" y="455" class="mono" fill="#ECFDF5" font-size="17">readonly</text>
  <text x="326" y="455" class="mono" fill="#ECFDF5" font-size="17">zero-deps</text>
  <text x="440" y="455" class="mono" fill="#ECFDF5" font-size="17">plain text / JSON</text>
</svg>
